$kind: http-request
name: Score Quiz
method: POST
url: '{{baseUrl}}/api/score'
description: |-
  Submit quiz answers to receive a full assessment result with specialty matches and trait scores.

  Rate limit: 30 requests per minute.

  The `answers` object maps question IDs (integers) to Likert scale values (1–5).
  The `audience` field must be one of: medical-student, high-school, dental-student.
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "audience": "medical-student",
      "answers": {
        "1": 4,
        "2": 3,
        "3": 5,
        "4": 2,
        "5": 4,
        "6": 3,
        "7": 5,
        "8": 4,
        "9": 2,
        "10": 3,
        "11": 4,
        "12": 5,
        "13": 3,
        "14": 4,
        "15": 2,
        "16": 5,
        "17": 3,
        "18": 4,
        "19": 2,
        "20": 3
      }
    }
